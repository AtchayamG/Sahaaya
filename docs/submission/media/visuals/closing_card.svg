<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Lora:ital,wght@0,400;0,500;0,600;1,400&amp;display=swap');
      .serif { font-family: 'Lora', Georgia, serif; }
      .sans { font-family: 'Inter', system-ui, sans-serif; }
      .mono { font-family: 'Consolas', 'Courier New', monospace; }
      .letter-spaced { letter-spacing: 4px; }
      .shadow { filter: drop-shadow(0px 6px 18px rgba(24, 49, 44, 0.08)); }
    </style>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fefdfb" />
      <stop offset="100%" stop-color="#faf8f2" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#faf8f2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)" />

  <!-- Borders -->
  <rect x="60" y="60" width="1800" height="960" rx="16" fill="none" stroke="#18312c" stroke-opacity="0.12" stroke-width="1.5" />
  <rect x="80" y="80" width="1760" height="920" rx="12" fill="none" stroke="#18312c" stroke-opacity="0.04" stroke-width="1" />

  <!-- Header -->
  <g transform="translate(960, 200)" text-anchor="middle">
    <text class="sans letter-spaced" font-size="13" font-weight="700" fill="#1d594b" opacity="0.8">DEMO COMPLETE</text>
    <text class="serif" font-size="76" font-weight="500" fill="#18312c" y="80">Build your family circle of trust.</text>
    <text class="sans" font-size="20" fill="#415e57" y="130">Explore the live sandbox deployment and review the validated source codebase.</text>
  </g>

  <!-- Two Columns for URLs -->
  <!-- Left Column: Live App -->
  <g transform="translate(420, 420)" class="shadow">
    <rect width="500" height="260" rx="12" fill="url(#card-grad)" stroke="#18312c" stroke-opacity="0.12" stroke-width="1" />
    <!-- Indicator bar -->
    <rect width="500" height="6" rx="3" fill="#1d594b" />
    
    <!-- Icon: Globe/Web -->
    <g transform="translate(50, 60)" stroke="#1d594b" stroke-width="2" fill="none">
      <circle cx="25" cy="25" r="22" />
      <ellipse cx="25" cy="25" rx="9" ry="22" />
      <line x1="3" y1="25" x2="47" y2="25" />
      <path d="M8 12h34M8 38h34" stroke-opacity="0.5" stroke-dasharray="2 2" />
    </g>

    <!-- Content -->
    <text x="120" y="80" class="sans" font-size="14" font-weight="700" fill="#1d594b" letter-spacing="1.5">INTERACTIVE APPLICATION</text>
    <text x="120" y="112" class="serif" font-size="28" font-weight="600" fill="#18312c">Run the Sandbox</text>
    
    <!-- Link area -->
    <rect x="50" y="160" width="400" height="60" rx="6" fill="#faf8f2" stroke="#1d594b" stroke-opacity="0.2" />
    <text x="250" y="197" class="sans" font-size="17" font-weight="600" fill="#1d594b" text-anchor="middle">sahaaya-khaki.vercel.app</text>
  </g>

  <!-- Right Column: Source Repository -->
  <g transform="translate(1000, 420)" class="shadow">
    <rect width="500" height="260" rx="12" fill="url(#card-grad)" stroke="#18312c" stroke-opacity="0.12" stroke-width="1" />
    <!-- Indicator bar -->
    <rect width="500" height="6" rx="3" fill="#c38c28" />
    
    <!-- Icon: Code/GitHub -->
    <g transform="translate(50, 60)" stroke="#c38c28" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="3" y="10" width="44" height="32" rx="4" stroke-width="2" />
      <path d="M16 21l-5 5 5 5M34 21l5 5-5 5" />
      <path d="M27 18l-4 16" stroke-width="1.5" />
    </g>

    <!-- Content -->
    <text x="120" y="80" class="sans" font-size="14" font-weight="700" fill="#c38c28" letter-spacing="1.5">SOURCE CODEBASE</text>
    <text x="120" y="112" class="serif" font-size="28" font-weight="600" fill="#18312c">Review Repository</text>
    
    <!-- Link area -->
    <rect x="50" y="160" width="400" height="60" rx="6" fill="#faf8f2" stroke="#c38c28" stroke-opacity="0.2" />
    <text x="250" y="197" class="sans" font-size="17" font-weight="600" fill="#c38c28" text-anchor="middle">github.com/AtchayamG/Sahaaya</text>
  </g>

  <!-- Bottom Safety Disclaimer & Backing info -->
  <g transform="translate(960, 830)" text-anchor="middle">
    <text class="serif" font-size="22" font-style="italic" fill="#415e57">
      “Sahaaya — when you cannot be there, your circle knows what to do.”
    </text>
    <text class="sans" font-size="12" font-weight="500" fill="#506963" y="55" letter-spacing="1">
      SAFE SANDBOX PROTOCOL • NO DATABASES • NO EXTERNAL INTEGRATIONS • LOCAL CITATIONS ONLY
    </text>
  </g>
</svg>
