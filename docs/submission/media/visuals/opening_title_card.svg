<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Lora:ital,wght@0,400;0,500;0,600;1,400&amp;display=swap');
      .serif { font-family: 'Lora', Georgia, serif; }
      .sans { font-family: 'Inter', system-ui, sans-serif; }
      .letter-spaced { letter-spacing: 6px; }
    </style>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fefdfb" />
      <stop offset="100%" stop-color="#faf8f2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)" />

  <!-- Elegant Editorial Borders -->
  <rect x="60" y="60" width="1800" height="960" rx="16" fill="none" stroke="#18312c" stroke-opacity="0.12" stroke-width="1.5" />
  <rect x="80" y="80" width="1760" height="920" rx="12" fill="none" stroke="#18312c" stroke-opacity="0.04" stroke-width="1" />

  <!-- Center Graphic: Interlocking Circle of Trust -->
  <g transform="translate(0, -20)">
    <!-- Central Icon Group -->
    <g transform="translate(0, 160)">
      <!-- Interlocking Rings -->
      <!-- Left/Bottom Ring: Gold (Care / Standby) -->
      <circle cx="910" cy="200" r="75" fill="#c38c28" fill-opacity="0.08" stroke="#c38c28" stroke-width="2.5" stroke-dasharray="2 2" />
      
      <!-- Right/Bottom Ring: Terracotta (Alerts / Action) -->
      <circle cx="1010" cy="200" r="75" fill="#b94a2c" fill-opacity="0.08" stroke="#b94a2c" stroke-width="2.5" stroke-dasharray="2 2" />
      
      <!-- Top/Center Ring: Teal (Secure / Verified) -->
      <circle cx="960" cy="120" r="75" fill="#1d594b" fill-opacity="0.08" stroke="#1d594b" stroke-width="3" />
      
      <!-- Center Core: Hearth/Shield symbol -->
      <path d="M960 102c4-2 8-5 8-10s-4-9-8-9-8 4-8 9 4 8 8 10zm-15 48c0-15 15-25 15-25s15 10 15 25-10 20-15 20-15-5-15-20z" fill="#18312c" fill-opacity="0.6" />
    </g>

    <!-- Main Typography -->
    <g transform="translate(960, 520)" text-anchor="middle">
      <!-- Project Category/Context -->
      <text x="0" y="0" class="sans letter-spaced" font-size="14" font-weight="700" fill="#1d594b" opacity="0.8">OPENAI BUILD WEEK — APPS FOR YOUR LIFE</text>
      
      <!-- Main Branding Name -->
      <text x="0" y="110" class="serif" font-size="105" font-weight="500" fill="#18312c" letter-spacing="-1">Sahaaya</text>
      
      <!-- Functional Subtitle -->
      <text x="0" y="180" class="sans letter-spaced" font-size="22" font-weight="600" fill="#c38c28">FAMILY CONTINUITY PLANNER</text>
      
      <!-- Premium Separator line -->
      <line x1="-120" y1="230" x2="120" y2="230" stroke="#18312c" stroke-opacity="0.15" stroke-width="1.5" />
      
      <!-- Core Reassuring Tagline -->
      <text x="0" y="290" class="serif" font-size="32" font-style="italic" fill="#415e57">
        “When you cannot be there, your circle knows what to do.”
      </text>
    </g>
  </g>

  <!-- Bottom Metadata Footer -->
  <g transform="translate(960, 960)" text-anchor="middle" opacity="0.6">
    <text class="sans" font-size="13" font-weight="500" fill="#18312c" letter-spacing="1">
      SANDBOXED P0 REPLAY &amp; GPT-5.6 DEMO • SIMULATED FICTIONAL BRIEF
    </text>
  </g>
</svg>
