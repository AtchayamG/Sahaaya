<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Styles -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Lora:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap');
      .serif { font-family: 'Lora', Georgia, serif; }
      .sans { font-family: 'Inter', system-ui, sans-serif; }
      .shadow { filter: drop-shadow(0px 8px 24px rgba(24, 49, 44, 0.12)); }
      .shadow-sm { filter: drop-shadow(0px 4px 12px rgba(24, 49, 44, 0.06)); }
    </style>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fefdfb" />
      <stop offset="100%" stop-color="#faf8f2" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fefdfb" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)" />
  
  <!-- Subtle Grid/Pattern (Warm, Editorial Layout lines) -->
  <path d="M 0,0 L 1280,720 M 0,720 L 1280,0" stroke="#18312c" stroke-opacity="0.01" stroke-width="1.5" />
  <rect x="30" y="30" width="1220" height="660" rx="12" fill="none" stroke="#18312c" stroke-opacity="0.08" stroke-width="1" />
  <rect x="40" y="40" width="1200" height="640" rx="8" fill="none" stroke="#18312c" stroke-opacity="0.04" stroke-width="1" />
  
  <!-- Left Side: Typography Content -->
  <g transform="translate(100, 120)">
    <!-- Brand / Category Badge -->
    <g transform="translate(0, 0)">
      <rect width="210" height="32" rx="16" fill="#1d594b" fill-opacity="0.08" />
      <rect width="210" height="32" rx="16" fill="none" stroke="#1d594b" stroke-opacity="0.2" stroke-width="1" />
      <text x="15" y="20" class="sans" font-size="11" font-weight="700" fill="#1d594b" letter-spacing="1.5">APPS FOR YOUR LIFE</text>
    </g>

    <!-- Main Title -->
    <text x="0" y="110" class="serif" font-size="82" font-weight="600" fill="#18312c">Sahaaya</text>
    
    <!-- Subtitle -->
    <text x="0" y="155" class="sans" font-size="20" font-weight="600" fill="#c38c28" letter-spacing="4">FAMILY CONTINUITY PLANNER</text>
    
    <!-- Tagline (Wrap in tspans) -->
    <text x="0" y="240" class="serif" font-size="28" font-style="italic" fill="#415e57">
      <tspan x="0" dy="0">When you cannot be there,</tspan>
      <tspan x="0" dy="42">your circle knows what to do.</tspan>
    </text>

    <!-- Bullet points / Trust indicators -->
    <g transform="translate(0, 360)">
      <!-- Item 1 -->
      <circle cx="12" cy="12" r="8" fill="#1d594b" fill-opacity="0.1" />
      <path d="M9 12l2 2 4-4" fill="none" stroke="#1d594b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="32" y="17" class="sans" font-size="16" font-weight="600" fill="#18312c">Grounded Continuity Map</text>

      <!-- Item 2 -->
      <circle cx="12" cy="52" r="8" fill="#1d594b" fill-opacity="0.1" />
      <path d="M9 52l2 2 4-4" fill="none" stroke="#1d594b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="32" y="57" class="sans" font-size="16" font-weight="600" fill="#18312c">Deterministic Safe Handoff</text>

      <!-- Item 3 -->
      <circle cx="12" cy="92" r="8" fill="#1d594b" fill-opacity="0.1" />
      <path d="M9 92l2 2 4-4" fill="none" stroke="#1d594b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <text x="32" y="97" class="sans" font-size="16" font-weight="600" fill="#18312c">Privacy-First Planning Demo</text>
    </g>
  </g>
  
  <!-- Right Side: Graphic Mockup / Card Stack -->
  <g transform="translate(700, 80)" class="shadow">
    <!-- Card 1: Elder Check (Bottom in stack) -->
    <g transform="translate(40, 240) rotate(-4)" class="shadow-sm">
      <rect width="400" height="190" rx="12" fill="url(#card-grad)" stroke="#18312c" stroke-opacity="0.1" stroke-width="1" />
      <!-- Left color bar -->
      <rect x="0" y="0" width="8" height="190" rx="4" fill="#b94a2c" />
      <!-- Content -->
      <text x="30" y="40" class="sans" font-size="12" font-weight="700" fill="#b94a2c" letter-spacing="1">ELDER CHECK</text>
      <text x="30" y="70" class="serif" font-size="20" font-weight="600" fill="#18312c">Auntie Leela Daily Call</text>
      <text x="30" y="105" class="sans" font-size="13" fill="#415e57">🕒 7:00 PM Each Evening</text>
      <text x="30" y="130" class="sans" font-size="13" fill="#415e57">👤 Primary: Arjun | Backup: Lakshmi</text>
      <!-- Approved Stamp -->
      <rect x="290" y="135" width="80" height="28" rx="14" fill="#faf8f2" stroke="#b94a2c" stroke-opacity="0.3" />
      <text x="330" y="153" class="sans" font-size="11" font-weight="700" fill="#b94a2c" text-anchor="middle">✓ ACTIVE</text>
    </g>

    <!-- Card 2: Pet Feeding (Middle in stack) -->
    <g transform="translate(10, 110) rotate(2)" class="shadow-sm">
      <rect width="400" height="190" rx="12" fill="url(#card-grad)" stroke="#18312c" stroke-opacity="0.1" stroke-width="1" />
      <!-- Left color bar -->
      <rect x="0" y="0" width="8" height="190" rx="4" fill="#c38c28" />
      <!-- Content -->
      <text x="30" y="40" class="sans" font-size="12" font-weight="700" fill="#c38c28" letter-spacing="1">PET FEEDING</text>
      <text x="30" y="70" class="serif" font-size="20" font-weight="600" fill="#18312c">Feed Milo (Dog)</text>
      <text x="30" y="105" class="sans" font-size="13" fill="#415e57">🕒 Morning &amp; Evening Absence Window</text>
      <text x="30" y="130" class="sans" font-size="13" fill="#415e57">👤 Primary: Neha | Backup: Lakshmi</text>
      <!-- Warning Badge for lakshmi conflict -->
      <rect x="250" y="22" width="125" height="24" rx="4" fill="#b94a2c" fill-opacity="0.08" />
      <text x="312" y="38" class="sans" font-size="10" font-weight="700" fill="#b94a2c" text-anchor="middle">⚠️ COLLISION</text>
    </g>

    <!-- Card 3: School Pickup (Top in stack) -->
    <g transform="translate(-20, -10) rotate(-2)" class="shadow-sm">
      <rect width="400" height="190" rx="12" fill="url(#card-grad)" stroke="#18312c" stroke-opacity="0.15" stroke-width="1.5" />
      <!-- Left color bar -->
      <rect x="0" y="0" width="8" height="190" rx="4" fill="#1d594b" />
      <!-- Content -->
      <text x="30" y="40" class="sans" font-size="12" font-weight="700" fill="#1d594b" letter-spacing="1">SCHOOL &amp; CARE</text>
      <text x="30" y="70" class="serif" font-size="20" font-weight="600" fill="#18312c">Aarav School Pickup</text>
      <text x="30" y="105" class="sans" font-size="13" fill="#415e57">🕒 3:15 PM Weekdays</text>
      <text x="30" y="130" class="sans" font-size="13" fill="#415e57">👤 Primary: Lakshmi | Backup: Arjun</text>
      <!-- Approved Stamp -->
      <rect x="280" y="135" width="95" height="28" rx="14" fill="#f2f8f6" stroke="#1d594b" stroke-width="1" />
      <text x="327" y="153" class="sans" font-size="11" font-weight="700" fill="#1d594b" text-anchor="middle">✓ APPROVED</text>
    </g>
    
    <!-- Deterministic Signature Seal -->
    <g transform="translate(180, 410) rotate(1)" class="shadow-sm">
      <rect width="210" height="60" rx="6" fill="#faf8f2" stroke="#1d594b" stroke-opacity="0.3" stroke-width="1" />
      <text x="15" y="20" class="sans" font-size="9" font-weight="700" fill="#1d594b" letter-spacing="1">PLAN INTEGRITY SECURED</text>
      <text x="15" y="38" class="sans" font-size="12" font-weight="700" fill="#18312c">SHA-256 VERIFIED</text>
      <circle cx="180" cy="30" r="14" fill="#1d594b" />
      <path d="M174 30l4 4 8-8" fill="none" stroke="#faf8f2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
